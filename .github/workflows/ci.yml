name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must be set up before setup-node so that `cache: pnpm` can resolve
      # the pnpm store path. Version is read from the "packageManager" field in
      # package.json (pnpm@11.1.1); do NOT also pass a `version:` here, or
      # pnpm/action-setup errors on a duplicate version spec.
      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      # `--if-present` must precede the script name so pnpm treats it as its own
      # flag, not an argument forwarded to the test runner. Workspaces without a
      # "test" script are skipped without failing the job.
      - name: Test
        run: pnpm -r run --if-present test
